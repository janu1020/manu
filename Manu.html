<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Proposal</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #ffd1dc, #ff4d6d);
    overflow: hidden;
    text-align: center;
    color: white;
}

/* Center container */
.container {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
}

/* Bear animation */
.bear {
    font-size: 60px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* Heading */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 40px;
}

/* Subtitle */
.subtitle {
    font-style: italic;
    margin-bottom: 30px;
}

/* Buttons */
.buttons {
    display: flex;
    justify-content: center;
    gap: 40px;
}

/* Yes button */
.yes-btn {
    background: linear-gradient(to right, #ff0000, #ff4d4d);
    color: white;
    border: none;
    padding: 15px 35px;
    font-size: 18px;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
}

.yes-btn:hover {
    box-shadow: 0 0 20px red;
}

/* No button */
.no-btn {
    background: white;
    color: red;
    border: 2px solid red;
    padding: 12px 25px;
    border-radius: 50px;
    cursor: pointer;
    position: relative;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 0;
    }
    50% { opacity: 1; }
    100% {
        transform: translateY(-100vh);
        opacity: 0;
    }
}

/* Celebration */
.celebration {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: #ff4d6d;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

.celebration h2 {
    font-size: 50px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

.spin {
    font-size: 60px;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="container" id="mainContent">
    <div class="bear">🐻</div>

    <h1>Will You Be My Valentine, [THEIR ACTUAL NAME]?</h1>

    <div class="subtitle">[Tu hi meri jindgi hai tere bina me kisi kam ka nhi]</div>

    <p>Every love story is beautiful, but ours is my favourite</p>

    <div class="buttons">
        <button class="yes-btn" onclick="sayYes()">Yes ❤️</button>
        <button class="no-btn" id="noBtn">No</button>
    </div>
</div>

<!-- Celebration Screen -->
<div class="celebration" id="celebration">
    <h2>Yayyyy!! 🎉</h2>
    <div class="spin">💖</div>
    <p>[My Lifeline ]</p>
</div>

<script>
/* Floating Hearts */
let hearts = [];
for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);
    hearts.push(heart);
}

/* No Button Run Away */
const noBtn = document.getElementById("noBtn");
const messages = [
    "Nope, not an option!",
    "Try again!",
    "You sure about that?",
    "Not happening!",
    "Think again!"
    
];
let msgIndex = 0;

noBtn.addEventListener("click", moveNoButton);
noBtn.addEventListener("mouseover", moveNoButton);

function moveNoButton() {
    const yesBtn = document.querySelector(".yes-btn").getBoundingClientRect();

    let x, y;
    do {
        x = Math.random() * window.innerWidth;
        y = Math.random() * window.innerHeight;
    } while (
        x > yesBtn.left - 100 &&
        x < yesBtn.right + 100 &&
        y > yesBtn.top - 50 &&
        y < yesBtn.bottom + 50
    );

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noBtn.innerText = messages[msgIndex];
    msgIndex = (msgIndex + 1) % messages.length;
}

/* YES CLICK */
function sayYes() {
    document.getElementById("mainContent").style.display = "none";

    // Stop hearts
    hearts.forEach(h => h.remove());

    let celebration = document.getElementById("celebration");
    celebration.style.display = "flex";

    createConfetti();
}

/* Confetti */
function createConfetti() {
    for (let i = 0; i < 120; i++) {
        let conf = document.createElement("div");
        conf.classList.add("confetti");

        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
        conf.style.animationDuration = (2 + Math.random() * 3) + "s";

        document.body.appendChild(conf);
    }
}
</script>

</body>
</html>
